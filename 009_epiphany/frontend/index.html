<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EPIPHANY — 三博士審議システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --melchior: #3b82f6;
    --balthasar: #ec4899;
    --casper: #f97316;
    --bg: #05070d;
    --panel: #0b1018;
    --line: #1c2733;
    --text: #c9d6e3;
    --dim: #5e6b7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Share Tech Mono", monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* スキャンライン */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    pointer-events: none; z-index: 9999; opacity: 0.5;
  }
  header {
    text-align: center; padding: 28px 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: "Orbitron", sans-serif; font-weight: 900;
    font-size: clamp(28px, 6vw, 52px); letter-spacing: 8px;
    color: #e8f0fa;
    text-shadow: 0 0 12px rgba(99,179,255,.55), 0 0 28px rgba(99,179,255,.25);
  }
  header p { color: var(--dim); margin-top: 6px; letter-spacing: 3px; font-size: 12px; }
  main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 80px; }

  .topic-bar { display: flex; gap: 10px; margin-bottom: 28px; }
  .topic-bar input {
    flex: 1; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 14px 16px; font-family: inherit; font-size: 15px;
    border-radius: 4px;
  }
  .topic-bar input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,.4); }
  button {
    background: #11202f; border: 1px solid #2b4a66; color: #cfe6ff;
    font-family: "Orbitron", sans-serif; font-weight: 700; letter-spacing: 2px;
    padding: 14px 22px; cursor: pointer; border-radius: 4px; transition: .15s;
  }
  button:hover:not(:disabled) { background: #16314a; box-shadow: 0 0 14px rgba(59,130,246,.45); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .sage {
    background: var(--panel); border: 1px solid var(--line);
    border-top: 3px solid var(--c); border-radius: 6px; padding: 16px;
    position: relative; min-height: 120px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 0 22px -8px var(--c);
  }
  .sage h2 {
    font-family: "Orbitron", sans-serif; font-size: 16px; letter-spacing: 3px;
    color: var(--c); text-shadow: 0 0 10px var(--c); margin-bottom: 2px;
  }
  .sage .role { color: var(--dim); font-size: 11px; margin-bottom: 12px; }
  .sage .provider {
    position: absolute; top: 14px; right: 14px; font-size: 10px;
    color: var(--dim); border: 1px solid var(--line); padding: 2px 6px; border-radius: 3px;
  }
  .sage .summary { font-size: 13px; line-height: 1.7; margin-bottom: 10px; }
  .sage ul { list-style: none; }
  .sage li { font-size: 12px; padding: 3px 0 3px 14px; position: relative; color: #aab8c6; }
  .sage li::before { content: "▸"; position: absolute; left: 0; color: var(--c); }
  .meta { display: flex; gap: 10px; margin-top: 12px; font-size: 11px; color: var(--dim); }
  .stance { color: #dbe7f2; }
  .bar { height: 4px; background: #182433; border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .bar > div { height: 100%; background: var(--c); box-shadow: 0 0 8px var(--c); }

  .section-title {
    font-family: "Orbitron", sans-serif; letter-spacing: 4px; color: #9fb4c8;
    font-size: 15px; margin: 34px 0 14px; padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
  }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 18px; }
  .uncertainty-gauge { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
  .uncertainty-gauge .num { font-family: "Orbitron"; font-size: 28px; color: #ffcf5c; text-shadow: 0 0 12px rgba(255,207,92,.5); }

  .points { display: grid; gap: 10px; margin-top: 10px; }
  .point {
    border: 1px solid var(--line); border-left: 3px solid #ffcf5c; border-radius: 4px;
    padding: 12px 14px; cursor: pointer; transition: .15s; background: #0a0f17;
  }
  .point:hover { border-left-color: #fff; box-shadow: 0 0 14px rgba(255,207,92,.25); }
  .point.selected { background: #15110a; border-left-color: #ffcf5c; box-shadow: 0 0 16px rgba(255,207,92,.4); }
  .point h3 { font-size: 14px; color: #ffe7a8; margin-bottom: 4px; }
  .point p { font-size: 12px; color: #9fb0c0; line-height: 1.6; }

  textarea {
    width: 100%; background: #0a0f17; border: 1px solid var(--line); color: var(--text);
    font-family: inherit; padding: 12px; border-radius: 4px; resize: vertical; min-height: 90px;
  }
  textarea:focus { outline: none; border-color: #ffcf5c; }
  select {
    background: #0a0f17; border: 1px solid var(--line); color: var(--text);
    font-family: inherit; padding: 10px; border-radius: 4px; width: 100%;
  }

  .typewriter::after { content: "▋"; animation: blink 1s steps(1) infinite; color: #6cf; }
  @keyframes blink { 50% { opacity: 0; } }
  .loading { color: var(--dim); font-size: 13px; }
  .glow-dot { display:inline-block; width:8px;height:8px;border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; margin-right:6px; }
  .hidden { display: none; }
  .err { color: #ff6b6b; border: 1px solid #5c1f1f; background:#1a0a0a; padding:10px; border-radius:4px; margin-top:12px; }
  footer { text-align:center; color: var(--dim); font-size: 11px; padding: 20px; letter-spacing: 2px; }
</style>
</head>
<body>
<header>
  <h1>EPIPHANY</h1>
  <p>磁 — 三博士相互査読審議システム — 議長：あなた</p>
</header>

<main>
  <div class="topic-bar">
    <input id="topic" type="text" placeholder="審議する議題を入力…（例：自社プロダクトに生成AI機能を導入すべきか）" />
    <button id="run">審議開始</button>
  </div>

  <div id="status" class="loading"></div>
  <div id="error"></div>

  <!-- Round 1: 3賢者の分析 -->
  <section id="round1" class="hidden">
    <div class="section-title">ROUND 1 — 独立分析</div>
    <div class="grid">
      <div class="sage" id="card-melchior" style="--c:var(--melchior)">
        <span class="provider"></span>
        <h2>MELCHIOR-1</h2><div class="role">データ・統計分析の賢者</div>
        <div class="body"></div>
      </div>
      <div class="sage" id="card-balthasar" style="--c:var(--balthasar)">
        <span class="provider"></span>
        <h2>BALTHASAR-2</h2><div class="role">リスク・倫理評価の賢者</div>
        <div class="body"></div>
      </div>
      <div class="sage" id="card-casper" style="--c:var(--casper)">
        <span class="provider"></span>
        <h2>CASPER-3</h2><div class="role">創造・提案の賢者</div>
        <div class="body"></div>
      </div>
    </div>
  </section>

  <!-- モデレーター統合 -->
  <section id="moderator" class="hidden">
    <div class="section-title">MODERATOR — 統合・争点抽出</div>
    <div class="panel">
      <div id="synthesis" class="summary" style="font-size:14px;line-height:1.8"></div>
      <div class="uncertainty-gauge">
        <span>不確実性</span>
        <span class="num" id="unc-num">--</span>
        <div class="bar" style="flex:1;--c:#ffcf5c"><div id="unc-bar" style="width:0%"></div></div>
      </div>
      <div id="unc-drivers" style="font-size:12px;color:var(--dim)"></div>
      <div style="margin-top:16px;color:#9fb4c8;letter-spacing:2px;font-size:13px">▼ 再討論する争点を1つ選択してください</div>
      <div class="points" id="points"></div>
      <button id="run2" style="margin-top:16px" disabled>選択した争点で再討論</button>
    </div>
  </section>

  <!-- Round 2: 再討論 -->
  <section id="round2" class="hidden">
    <div class="section-title">ROUND 2 — 再討論</div>
    <div class="grid" id="round2-grid"></div>
    <div class="panel" style="margin-top:16px">
      <div class="uncertainty-gauge">
        <span>再評価後の不確実性</span>
        <span class="num" id="unc2-num">--</span>
        <div class="bar" style="flex:1;--c:#ffcf5c"><div id="unc2-bar" style="width:0%"></div></div>
      </div>
      <div id="unc2-rec" style="font-size:13px;color:#cfe6ff;margin-top:6px"></div>
    </div>
  </section>

  <!-- 最終判断 -->
  <section id="judgment" class="hidden">
    <div class="section-title">FINAL JUDGMENT — 議長の最終判断</div>
    <div class="panel">
      <label style="font-size:12px;color:var(--dim)">決定</label>
      <select id="decision" style="margin:6px 0 14px">
        <option value="承認">承認（GO）</option>
        <option value="却下">却下（NO GO）</option>
        <option value="保留">保留（要追加調査）</option>
        <option value="条件付き承認">条件付き承認</option>
      </select>
      <label style="font-size:12px;color:var(--dim)">理由・コメント</label>
      <textarea id="rationale" placeholder="判断の根拠を記録…"></textarea>
      <button id="run3" style="margin-top:14px">最終判断を記録</button>
    </div>
  </section>

  <section id="done" class="hidden">
    <div class="section-title">RECORDED</div>
    <div class="panel"><span class="glow-dot"></span><span id="done-msg"></span></div>
  </section>
</main>

<footer>EPIPHANY v0.1 — Three Magi Deliberation Engine</footer>

<script>
// 同一オリジン配信時は相対パス、file:// 等で直接開いた場合は localhost:8000 にフォールバック
const API = location.protocol.startsWith("http") ? "" : "http://localhost:8000";
let SESSION = null;
let SELECTED = null;

const $ = (id) => document.getElementById(id);
const show = (id) => $(id).classList.remove("hidden");
const setStatus = (t) => { $("status").textContent = t; };
const setError = (t) => { $("error").innerHTML = t ? `<div class="err">⚠ ${t}</div>` : ""; };

async function api(path, body) {
  const res = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// タイプライター表示
function typewrite(el, text, speed = 12) {
  return new Promise((resolve) => {
    el.classList.add("typewriter");
    let i = 0;
    const t = setInterval(() => {
      el.textContent = text.slice(0, i++);
      if (i > text.length) { clearInterval(t); el.classList.remove("typewriter"); resolve(); }
    }, speed);
  });
}

function renderSage(id, a) {
  const card = $("card-" + id);
  card.querySelector(".provider").textContent = a.provider || "";
  const conf = Math.round((a.confidence ?? 0) * 100);
  const pts = (a.key_points || []).map((p) => `<li>${escape(p)}</li>`).join("");
  card.querySelector(".body").innerHTML = `
    <div class="summary">${escape(a.summary || a.raw || "（応答なし）")}</div>
    <ul>${pts}</ul>
    <div class="meta"><span class="stance">立場: ${escape(a.stance || "—")}</span><span>確信度 ${conf}%</span></div>
    <div class="bar"><div style="width:${conf}%"></div></div>`;
}

function escape(s) { return String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

function renderModerator(m) {
  $("synthesis").textContent = m.synthesis || m.raw || "";
  const u = m.uncertainty || {};
  const score = Math.round((u.score ?? 0) * 100);
  $("unc-num").textContent = (u.score ?? 0).toFixed(2);
  $("unc-bar").style.width = score + "%";
  $("unc-drivers").textContent = "要因: " + (u.drivers || []).join(" / ");

  const wrap = $("points"); wrap.innerHTML = "";
  (m.contention_points || []).forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "point";
    div.innerHTML = `<h3>争点 ${i + 1}: ${escape(p.title || "")}</h3><p>${escape(p.description || "")}</p>`;
    div.onclick = () => {
      document.querySelectorAll(".point").forEach((e) => e.classList.remove("selected"));
      div.classList.add("selected");
      SELECTED = p; $("run2").disabled = false;
    };
    wrap.appendChild(div);
  });
}

function renderRound2(r2, unc) {
  const grid = $("round2-grid"); grid.innerHTML = "";
  const colors = { melchior: "var(--melchior)", balthasar: "var(--balthasar)", casper: "var(--casper)" };
  const resp = r2.responses || {};
  ["melchior", "balthasar", "casper"].forEach((id) => {
    const a = resp[id] || {};
    const conf = Math.round((a.confidence ?? 0) * 100);
    const div = document.createElement("div");
    div.className = "sage"; div.style.setProperty("--c", colors[id]);
    div.innerHTML = `<h2>${escape(a.name || id.toUpperCase())}</h2>
      <div class="summary">${escape(a.revised_summary || a.raw || "")}</div>
      <div style="font-size:12px;color:#9fb0c0;border-top:1px dashed var(--line);padding-top:8px;margin-top:8px">
        <b style="color:#cfe6ff">反論:</b> ${escape(a.rebuttal || "—")}</div>
      <div class="meta"><span class="stance">立場: ${escape(a.stance || "—")}</span><span>確信度 ${conf}%</span></div>
      <div class="bar"><div style="width:${conf}%"></div></div>`;
    grid.appendChild(div);
  });
  const score = Math.round((unc.score ?? 0) * 100);
  $("unc2-num").textContent = (unc.score ?? 0).toFixed(2);
  $("unc2-bar").style.width = score + "%";
  $("unc2-rec").textContent = (unc.recommendation ? "助言: " + unc.recommendation : "") +
    (unc.delta ? "（" + unc.delta + "）" : "");
}

// --- フロー制御 ---
$("run").onclick = async () => {
  const topic = $("topic").value.trim();
  if (!topic) return setError("議題を入力してください");
  setError(""); $("run").disabled = true;
  setStatus("◆ 三博士が並列に分析中…");
  try {
    const data = await api("/api/round1", { topic });
    SESSION = data.session_id;
    show("round1");
    ["melchior", "balthasar", "casper"].forEach((id) => renderSage(id, data.analyses[id] || {}));
    setStatus("◆ モデレーターが争点を統合…");
    show("moderator");
    renderModerator(data.moderator);
    setStatus("");
  } catch (e) { setError(e.message); }
  $("run").disabled = false;
};

$("run2").onclick = async () => {
  if (!SELECTED) return;
  setError(""); $("run2").disabled = true;
  setStatus("◆ 選択された争点で再討論中…");
  try {
    const data = await api("/api/round2", { session_id: SESSION, selected_point: SELECTED });
    show("round2");
    renderRound2(data.round2, data.uncertainty);
    show("judgment");
    setStatus("");
  } catch (e) { setError(e.message); $("run2").disabled = false; }
};

$("run3").onclick = async () => {
  setError(""); $("run3").disabled = true;
  setStatus("◆ 最終判断を記録中…");
  try {
    const judgment = { decision: $("decision").value, rationale: $("rationale").value };
    await api("/api/judgment", { session_id: SESSION, judgment });
    show("done");
    $("done-msg").textContent = `判断「${judgment.decision}」を記録しました。session=${SESSION}`;
    setStatus("");
  } catch (e) { setError(e.message); $("run3").disabled = false; }
};
</script>
</body>
</html>
